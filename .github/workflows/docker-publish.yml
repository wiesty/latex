name: Docker

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/latex-editor

jobs:
  build:
    name: Build and publish image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.url=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.description=Self-hosted browser-based LaTeX editor
            org.opencontainers.image.licenses=MIT
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Build date
        id: build-date
        run: echo "date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Build image
        run: |
          tags=()
          while IFS= read -r tag; do
            tags+=("--tag" "$tag")
          done <<< "${DOCKER_METADATA_OUTPUT_TAGS}"

          labels=()
          while IFS= read -r label; do
            labels+=("--label" "$label")
          done <<< "${DOCKER_METADATA_OUTPUT_LABELS}"

          docker build \
            "${tags[@]}" \
            "${labels[@]}" \
            --build-arg "BUILD_DATE=${{ steps.build-date.outputs.date }}" \
            --build-arg "SOURCE_REPOSITORY=${{ github.server_url }}/${{ github.repository }}" \
            .

      - name: Push image
        if: github.event_name != 'pull_request'
        run: |
          while IFS= read -r tag; do
            docker push "$tag"
          done <<< "${DOCKER_METADATA_OUTPUT_TAGS}"
