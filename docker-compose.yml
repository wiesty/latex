services:
  latex-editor:
    image: ghcr.io/wiesty/latex:latest
    # build:
    #   context: .
    #   args:
    #     SOURCE_REPOSITORY: https://github.com/wiesty/latex
    ports:
      - "3107:3107"
    volumes:
      # Map your projects folder — each subfolder becomes a project
      - ./projects:/projects
      # Persist editor configuration
      - latex-config:/data/config

volumes:
  latex-config:
